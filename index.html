<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Gestión de Hotel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        iron: {
                            50: '#f6f7f9', 100: '#edf0f3', 200: '#d8dee5', 300: '#b8c5d3', 400: '#93a6be',
                            500: '#738aa8', 600: '#5c718f', 700: '#4b5c75', 800: '#404e62', 900: '#1e2530', 950: '#0f131a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b0f14; background-image: radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.05) 0px, transparent 40%); }
        .bento-card { background: #131922; border: 1px solid #1f2937; transition: all 0.3s ease; }
        .bento-card:hover { border-color: #38bdf8; box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.15); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f131a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #273549; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #38bdf8; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .grid-section { display: none; }
        .grid-section.active { display: grid; }
    </style>
</head>

<body class="text-slate-300 min-h-screen font-sans">

    <main class="max-w-7xl mx-auto px-6 py-10 space-y-8">
        
        <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6 pb-6 border-b border-iron-800">
            <div>
                <h1 class="text-3xl font-bold font-display text-white tracking-tight flex items-center gap-3">
                    <svg class="w-8 h-8 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5m0 0V11m0 5h2m2 0h2m4 0h.01M5 7h.01M5 11h.01M12 7h.01M12 11h.01M19 7h.01M19 11h.01m-4 6h.01M15 7h.01M15 11h.01M11 17h.01M7 17h.01M7 13h.01M11 13h.01M15 13h.01M19 13h.01"></path></svg>
                    Sistema de Control Integral
                </h1>
                <p class="text-xs text-iron-400 mt-1 uppercase tracking-wider font-medium">Administración de Hotel Core</p>
            </div>
            <button onclick="sincronizarTodo()" class="px-5 py-2.5 bg-iron-800 hover:bg-iron-700 text-white font-semibold text-xs tracking-wider uppercase rounded-xl border border-iron-700 transition-all flex items-center gap-2">
                <svg class="w-4 h-4 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.253 8H18"></path></svg>
                Sincronizar Base de Datos
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

            <section class="bento-card lg:col-span-4 rounded-2xl p-6 flex flex-col justify-between self-start">
                <div class="w-full space-y-6">
                    <div class="border-b border-iron-800 pb-4">
                        <label class="block text-[10px] font-bold text-iron-400 uppercase tracking-wide mb-2">Módulo de Registro</label>
                        <select id="form-selector" onchange="cambiarFormulario()" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white focus:outline-none focus:border-sky-500 font-bold">
                            <option value="hab">Habitación</option>
                            <option value="res">Reserva</option>
                            <option value="hue">Huésped</option>
                            <option value="emp">Empleado</option>
                            <option value="fac">Factura</option>
                        </select>
                    </div>

                    <div id="form-hab" class="form-section active space-y-4">
                        <div class="p-3 bg-sky-900/10 border border-sky-500/30 rounded-xl">
                            <label class="block text-[10px] font-bold text-sky-400 uppercase mb-1">ID (OBLIGATORIO SOLO PARA ACTUALIZAR)</label>
                            <input type="number" id="f-hab-id" placeholder="Déjalo vacío si vas a crear..." class="w-full px-3 py-2 text-sm bg-iron-950/50 border border-sky-800/50 rounded-lg text-sky-300 placeholder:text-sky-700/50 focus:outline-none focus:border-sky-400 font-semibold">
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="col-span-3"><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Número de Habitación</label><input type="number" id="f-hab-num" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Piso</label><input type="number" id="f-hab-piso" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Capacidad</label><input type="number" id="f-hab-cap" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Tipo</label><input type="text" id="f-hab-tipo" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                        </div>
                    </div>

                    <div id="form-res" class="form-section space-y-4">
                        <div class="p-3 bg-sky-900/10 border border-sky-500/30 rounded-xl">
                            <label class="block text-[10px] font-bold text-sky-400 uppercase mb-1">ID (OBLIGATORIO SOLO PARA ACTUALIZAR)</label>
                            <input type="number" id="f-res-id" placeholder="Déjalo vacío si vas a crear..." class="w-full px-3 py-2 text-sm bg-iron-950/50 border border-sky-800/50 rounded-lg text-sky-300 placeholder:text-sky-700/50 focus:outline-none focus:border-sky-400 font-semibold">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="col-span-2"><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Estado de Reserva</label><input type="text" id="f-res-estado" placeholder="Ej. Confirmada, Cancelada" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">ID Huésped</label><input type="number" id="f-res-hue" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">ID Empleado</label><input type="number" id="f-res-emp" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Personas</label><input type="number" id="f-res-per" value="1" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Total ($)</label><input type="number" id="f-res-precio" value="0.0" step="0.01" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                        </div>
                    </div>

                    <div id="form-hue" class="form-section space-y-4">
                        <div class="p-3 bg-sky-900/10 border border-sky-500/30 rounded-xl">
                            <label class="block text-[10px] font-bold text-sky-400 uppercase mb-1">ID (OBLIGATORIO SOLO PARA ACTUALIZAR)</label>
                            <input type="number" id="f-hue-id" placeholder="Déjalo vacío si vas a crear..." class="w-full px-3 py-2 text-sm bg-iron-950/50 border border-sky-800/50 rounded-lg text-sky-300 placeholder:text-sky-700/50 focus:outline-none focus:border-sky-400 font-semibold">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Nombre</label><input type="text" id="f-hue-nom" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Apellido</label><input type="text" id="f-hue-ape" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div class="col-span-2"><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Documento / DNI</label><input type="text" id="f-hue-dni" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Email</label><input type="email" id="f-hue-mail" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Teléfono</label><input type="text" id="f-hue-tel" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                        </div>
                    </div>

                    <div id="form-emp" class="form-section space-y-4">
                        <div class="p-3 bg-sky-900/10 border border-sky-500/30 rounded-xl">
                            <label class="block text-[10px] font-bold text-sky-400 uppercase mb-1">ID (OBLIGATORIO SOLO PARA ACTUALIZAR)</label>
                            <input type="number" id="f-emp-id" placeholder="Déjalo vacío si vas a crear..." class="w-full px-3 py-2 text-sm bg-iron-950/50 border border-sky-800/50 rounded-lg text-sky-300 placeholder:text-sky-700/50 focus:outline-none focus:border-sky-400 font-semibold">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Nombre</label><input type="text" id="f-emp-nom" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Apellido</label><input type="text" id="f-emp-ape" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div class="col-span-2"><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Cargo</label><input type="text" id="f-emp-cargo" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Email</label><input type="email" id="f-emp-mail" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Teléfono</label><input type="text" id="f-emp-tel" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                        </div>
                    </div>

                    <div id="form-fac" class="form-section space-y-4">
                        <div class="p-3 bg-sky-900/10 border border-sky-500/30 rounded-xl">
                            <label class="block text-[10px] font-bold text-sky-400 uppercase mb-1">ID (OBLIGATORIO SOLO PARA ACTUALIZAR)</label>
                            <input type="number" id="f-fac-id" placeholder="Déjalo vacío si vas a crear..." class="w-full px-3 py-2 text-sm bg-iron-950/50 border border-sky-800/50 rounded-lg text-sky-300 placeholder:text-sky-700/50 focus:outline-none focus:border-sky-400 font-semibold">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="col-span-2"><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">ID de Reserva Asociada</label><input type="number" id="f-fac-res" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div class="col-span-2"><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Nº Factura (000-000-000000000)</label><input type="text" id="f-fac-num" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div class="col-span-2"><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Fecha de Emisión</label><input type="datetime-local" id="f-fac-fecha" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Subtotal</label><input type="number" id="f-fac-sub" step="0.01" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">IVA</label><input type="number" id="f-fac-iva" step="0.01" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white"></div>
                            <div class="col-span-2"><label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Total</label><input type="number" id="f-fac-tot" step="0.01" class="w-full px-3 py-2 text-sm bg-iron-950 border border-iron-800 rounded-xl text-white font-bold"></div>
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-iron-800 mt-6 space-y-3">
                    <div class="flex gap-3">
                        <button onclick="ejecutarAccion(false)" class="w-full py-2.5 bg-sky-600 hover:bg-sky-500 text-white font-bold text-xs tracking-wider uppercase rounded-xl transition-all shadow-md">Crear Nuevo</button>
                        <button onclick="ejecutarAccion(true)" class="w-full py-2.5 bg-iron-800 hover:bg-iron-700 text-slate-200 font-bold text-xs tracking-wider uppercase rounded-xl transition-all border border-iron-700">Actualizar Existente</button>
                    </div>
                    <div id="form-feedback" class="text-[11px] text-center font-medium h-4"></div>
                </div>
            </section>

            <div class="lg:col-span-8 flex flex-col gap-6">
                
                <section class="bento-card rounded-2xl p-6 flex flex-col justify-start min-h-[500px]">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-iron-800 pb-4 mb-6 gap-3">
                        <div>
                            <h2 class="text-base font-bold text-white tracking-wide flex items-center gap-2">
                                <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Explorador de Registros
                            </h2>
                        </div>
                        <select id="grid-selector" onchange="cambiarLista()" class="px-4 py-2 text-xs bg-iron-950 border border-iron-800 rounded-xl text-white focus:outline-none focus:border-sky-500 font-bold tracking-wide">
                            <option value="hab">Ver Habitaciones</option>
                            <option value="res">Ver Reservas</option>
                            <option value="hue">Ver Huéspedes</option>
                            <option value="emp">Ver Empleados</option>
                            <option value="fac">Ver Facturas</option>
                        </select>
                    </div>

                    <div id="grid-hab" class="grid-section active grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto pr-2 custom-scrollbar max-h-[400px]"></div>
                    <div id="grid-res" class="grid-section grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto pr-2 custom-scrollbar max-h-[400px]"></div>
                    <div id="grid-hue" class="grid-section grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto pr-2 custom-scrollbar max-h-[400px]"></div>
                    <div id="grid-emp" class="grid-section grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto pr-2 custom-scrollbar max-h-[400px]"></div>
                    <div id="grid-fac" class="grid-section grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto pr-2 custom-scrollbar max-h-[400px]"></div>
                </section>

                <section class="bento-card rounded-2xl p-6 border-red-950/40 bg-gradient-to-b from-red-950/5 to-transparent">
                    <h3 class="text-xs font-bold text-red-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Eliminador Universal
                    </h3>
                    <div class="flex flex-col sm:flex-row gap-3 items-end">
                        <div class="w-full sm:w-1/3">
                            <label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">Entidad</label>
                            <select id="del-tipo" class="w-full px-3 py-2 text-xs bg-iron-950 border border-iron-800 rounded-lg text-white focus:outline-none">
                                <option value="habitaciones">Habitación</option>
                                <option value="reservas">Reserva</option>
                                <option value="huespedes">Huésped</option>
                                <option value="empleados">Empleado</option>
                                <option value="facturas">Factura</option>
                            </select>
                        </div>
                        <div class="w-full sm:w-1/3">
                            <label class="block text-[10px] font-bold text-iron-400 uppercase mb-1">ID del Registro</label>
                            <input type="number" id="del-id" placeholder="Ej. 1" class="w-full px-3 py-2 text-xs bg-iron-950 border border-iron-800 rounded-lg text-white focus:outline-none focus:border-red-500">
                        </div>
                        <button onclick="eliminarEntidadGlobal()" class="w-full sm:w-1/3 px-4 py-2 bg-red-950/40 hover:bg-red-900/60 text-red-300 border border-red-500/30 text-xs font-semibold rounded-lg transition-colors">
                            Ejecutar Borrado
                        </button>
                    </div>
                    <div id="purge-feedback" class="text-[11px] text-red-400 mt-3 h-4"></div>
                </section>

            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
